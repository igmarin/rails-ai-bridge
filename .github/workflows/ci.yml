name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        rails: ["7.1", "7.2", "8.0"]
        exclude:
          - ruby: "3.2"
            rails: "8.0"

    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}

    env:
      RAILS_VERSION: ${{ matrix.rails }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec

      - name: Run RuboCop
        run: bundle exec rubocop --parallel
        if: matrix.ruby == '3.3' && matrix.rails == '8.0'

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run Snyk dependency scan
        id: snyk_test
        if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && env.SNYK_TOKEN != ''
        uses: snyk/actions/ruby@5ed1e90f8091fc49c14c6902e88169b5e9ce8671 # v0.9.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects --org=igmarin --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF to GitHub Code Scanning
        if: always() && env.SNYK_TOKEN != '' && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Fail on Snyk findings
        if: steps.snyk_test.outcome == 'failure'
        run: exit 1

      - name: Monitor dependencies in Snyk
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SNYK_TOKEN != ''
        uses: snyk/actions/ruby@5ed1e90f8091fc49c14c6902e88169b5e9ce8671 # v0.9.0
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: monitor
          args: --severity-threshold=high --all-projects --org=igmarin --project-name=rails-ai-bridge

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel
