name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        rails: ["7.1", "7.2", "8.0"]
        exclude:
          - ruby: "3.2"
            rails: "8.0"

    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}

    env:
      RAILS_VERSION: ${{ matrix.rails }}
      COVERAGE: ${{ matrix.ruby == '3.3' && matrix.rails == '8.0' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec

      - name: Upload coverage HTML
        if: matrix.ruby == '3.3' && matrix.rails == '8.0'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ruby-3.3-rails-8.0
          path: coverage/
          if-no-files-found: ignore

      - name: Run RuboCop
        run: bundle exec rubocop --parallel
        if: matrix.ruby == '3.3' && matrix.rails == '8.0'

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run Snyk to check for vulnerabilities
        if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && env.SNYK_TOKEN != ''
        uses: snyk/actions/ruby@5ed1e90f8091fc49c14c6902e88169b5e9ce8671 # v0.9.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel

      - name: YARD documentation coverage
        run: |
          bundle exec yard stats --list-undoc
          echo "Documentation stats printed above"
