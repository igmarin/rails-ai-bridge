plugins:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - "spec/fixtures/**/*"
    - "vendor/**/*"
    - "spec/internal/**/*"
    - "gemfiles/**/*"

Naming/FileName:
  Exclude:
    - "lib/rails-ai-bridge.rb"

Style/Documentation:
  Enabled: false

Metrics/ClassLength:
  Max: 240

Metrics/BlockLength:
  Max: 120
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
Metrics/AbcSize:
  Max: 110
RSpec/MultipleExpectations:
  Max: 25
RSpec/ExampleLength:
  Max: 40
RSpec/NamedSubject:
  Enabled: false
RSpec/NoExpectationExample:
  Enabled: false
Layout/LineLength:
  Max: 180
Metrics/ModuleLength:
  Max: 240
Metrics/MethodLength:
  Max: 70
RSpec/NestedGroups:
  Max: 5
RSpec/DescribeClass:
  Enabled: false
RSpec/VerifiedDoubles:
  Enabled: false
RSpec/StubbedMock:
  Enabled: false
RSpec/SpecFilePathFormat:
  Enabled: false
RSpec/IteratedExpectation:
  Enabled: false
RSpec/MultipleDescribes:
  Enabled: false
RSpec/MessageSpies:
  Enabled: false
Metrics/PerceivedComplexity:
  Max: 35
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
RSpec/ContextWording:
  Enabled: false
Metrics/CyclomaticComplexity:
  Max: 35
Metrics/ParameterLists:
  Max: 6
